# ─────────────────────────────────────────────────────────
#  Eagle Box Cricket — Nginx Configuration
#  Customer portal  : eagleboxcricket.com
#  Admin panel      : admin.eagleboxcricket.com   (hidden from customers)
# ─────────────────────────────────────────────────────────

# ── Customer Portal ────────────────────────────────────────
server {
    listen 80;
    server_name eagleboxcricket.com www.eagleboxcricket.com;

    root /var/www/eaglebox/dist;
    index index.html;

    # Serve the customer SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block any direct attempt to reach admin.html from the main domain
    location = /admin.html {
        return 404;
    }

    # Proxy API calls to the Node backend
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Admin Subdomain ────────────────────────────────────────
server {
    listen 80;
    server_name admin.eagleboxcricket.com;

    root /var/www/eaglebox/dist;

    # Serve admin.html as the root document for this subdomain
    location / {
        try_files $uri $uri/ /admin.html;
    }

    # Proxy API calls
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Restrict by IP (uncomment and add your office/home IPs)
    # allow 203.0.113.10;   # office static IP
    # allow 198.51.100.5;   # your home IP
    # deny all;

    # Security headers
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# ── HTTPS (add after certbot / Let's Encrypt) ──────────────
# Run: certbot --nginx -d eagleboxcricket.com -d www.eagleboxcricket.com -d admin.eagleboxcricket.com
